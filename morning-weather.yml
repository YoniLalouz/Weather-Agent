name: Morning Weather Agent

on:
  schedule:
    - cron: "13 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run weather agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CITY: ${{ secrets.CITY }}
          PAGE_URL: ${{ secrets.PAGE_URL }}
        run: python agent.py

      - name: Commit and push the updated page
        run: |
          git config user.name "weather-agent-bot"
          git config user.email "actions@github.com"
          git add docs/index.html docs/data.json
          git diff --staged --quiet || git commit -m "Update daily brief"
          git push
